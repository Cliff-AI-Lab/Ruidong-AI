  </text>
  <text x="600" y="178" text-anchor="middle" font-family="'Segoe UI','SF Pro Display',Helvetica,Arial,sans-serif" font-size="14" font-weight="400" fill="#58A6FF" opacity="0.7" letter-spacing="1">
