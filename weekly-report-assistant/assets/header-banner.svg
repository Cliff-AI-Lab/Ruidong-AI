    <circle cx="600" cy="100" r="80" fill="#00D4AA" opacity="0.06"/>
    <circle cx="1000" cy="140" r="60" fill="#7B61FF" opacity="0.07"/>
  </g>
  <!-- Document + AI decoration left -->
  <g opacity="0.25">
    <rect x="60" y="60" width="30" height="40" rx="4" stroke="#0A84FF" stroke-width="1.2" fill="none"/>
    <rect x="68" y="70" width="14" height="2" rx="1" fill="#0A84FF" opacity="0.6"/>
    <rect x="68" y="76" width="10" height="2" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="68" y="82" width="16" height="2" rx="1" fill="#0A84FF" opacity="0.4"/>
    <circle cx="120" cy="70" r="3" fill="#00D4AA"/><circle cx="140" cy="90" r="2" fill="#7B61FF"/>
    <line x1="90" y1="75" x2="117" y2="70" stroke="#0A84FF" stroke-width="0.8"/>
    <line x1="120" y1="70" x2="140" y2="90" stroke="#00D4AA" stroke-width="0.6"/>
  </g>
  <!-- Chart decoration right -->
  <g opacity="0.25">
    <rect x="1060" y="70" width="6" height="30" rx="2" fill="#0A84FF"/>
    <rect x="1072" y="58" width="6" height="42" rx="2" fill="#00D4AA"/>
    <rect x="1084" y="50" width="6" height="50" rx="2" fill="#7B61FF"/>
    <rect x="1096" y="42" width="6" height="58" rx="2" fill="#0A84FF"/>
    <circle cx="1110" cy="130" r="2.5" fill="#00D4AA"/><circle cx="1130" cy="120" r="2" fill="#7B61FF"/>
    <line x1="1096" y1="100" x2="1110" y2="130" stroke="#00D4AA" stroke-width="0.6"/>
  </g>
  <g filter="url(#tg)">
    <text x="600" y="100" text-anchor="middle" font-family="'Segoe UI','SF Pro Display',Helvetica,Arial,sans-serif" font-size="50" font-weight="800" fill="url(#ac)" letter-spacing="-1">
