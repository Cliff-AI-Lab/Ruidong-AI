<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/><stop offset="50%" stop-color="#111827"/><stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="ac" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF"/><stop offset="50%" stop-color="#00D4AA"/><stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="tg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="20" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="260" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#0A84FF" stroke-width="0.5">
