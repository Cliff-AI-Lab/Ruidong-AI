    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="260"/><line x1="200" y1="0" x2="200" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/><line x1="400" y1="0" x2="400" y2="260"/>
    <line x1="500" y1="0" x2="500" y2="260"/><line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="700" y1="0" x2="700" y2="260"/><line x1="800" y1="0" x2="800" y2="260"/>
    <line x1="900" y1="0" x2="900" y2="260"/><line x1="1000" y1="0" x2="1000" y2="260"/>
    <line x1="1100" y1="0" x2="1100" y2="260"/>
  </g>
  <g filter="url(#sg)">
