    <circle cx="60" cy="65" r="3" fill="#00D4AA"/>
    <circle cx="72" cy="65" r="3" fill="#0A84FF"/>
    <!-- Lock symbol -->
    <rect x="54" y="72" width="12" height="9" rx="2" fill="url(#g4)" opacity="0.8"/>
    <path d="M56 72 L56 68 C56 65 58 63 60 63 C62 63 64 65 64 68 L64 72" stroke="#00D4AA" stroke-width="1.5" fill="none"/>
