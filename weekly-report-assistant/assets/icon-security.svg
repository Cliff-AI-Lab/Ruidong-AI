    <line x1="60" y1="50" x2="60" y2="65" stroke="#0A84FF" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="65" x2="72" y2="65" stroke="#00D4AA" stroke-width="1.5" opacity="0.7"/>
    <line x1="60" y1="50" x2="72" y2="50" stroke="#0A84FF" stroke-width="1.5" opacity="0.5"/>
    <line x1="48" y1="65" x2="60" y2="65" stroke="#00D4AA" stroke-width="1.5" opacity="0.5"/>
    <!-- Circuit nodes -->
    <circle cx="48" cy="50" r="3" fill="#00D4AA"/>
    <circle cx="60" cy="50" r="3" fill="#0A84FF"/>
    <circle cx="72" cy="50" r="3" fill="#00D4AA"/>
