    <line x1="55" y1="84" x2="50" y2="96" stroke="#0A84FF" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <line x1="60" y1="84" x2="60" y2="98" stroke="#00D4AA" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="65" y1="84" x2="70" y2="96" stroke="#7B61FF" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <!-- Data particles -->
    <circle cx="48" cy="98" r="1.5" fill="#0A84FF" opacity="0.5"/>
    <circle cx="60" cy="102" r="1.5" fill="#00D4AA" opacity="0.5"/>
    <circle cx="72" cy="98" r="1.5" fill="#7B61FF" opacity="0.5"/>
    <circle cx="52" cy="94" r="1" fill="#0A84FF" opacity="0.3"/>
    <circle cx="68" cy="94" r="1" fill="#7B61FF" opacity="0.3"/>
