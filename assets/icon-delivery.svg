    <circle cx="60" cy="50" r="3" fill="#00D4AA" opacity="0.4"/>
    <!-- Fins -->
    <path d="M48 65 L38 78 L48 74Z" fill="#0A84FF" opacity="0.7"/>
    <path d="M72 65 L82 78 L72 74Z" fill="#0A84FF" opacity="0.7"/>
