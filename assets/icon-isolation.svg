<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <filter id="glis"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glis)">
    <!-- Outer sandbox box -->
    <rect x="24" y="28" width="72" height="64" rx="8" stroke="url(#gis)" stroke-width="2" fill="#00D4AA" fill-opacity="0.05"/>
    <!-- Dashed isolation border inside -->
    <rect x="32" y="36" width="56" height="48" rx="5" stroke="#0A84FF" stroke-width="1.2" stroke-dasharray="4 3" fill="none" opacity="0.5"/>
    <!-- Lock in center -->
    <rect x="50" y="58" width="20" height="16" rx="3" fill="url(#gis)" opacity="0.7"/>
    <path d="M54 58 L54 52 C54 47 57 44 60 44 C63 44 66 47 66 52 L66 58" stroke="#00D4AA" stroke-width="2" fill="none"/>
    <circle cx="60" cy="66" r="2.5" fill="#0D1117"/>
    <!-- VM icons in corners -->
    <rect x="36" y="40" width="10" height="8" rx="2" fill="#0A84FF" opacity="0.4"/>
    <rect x="74" y="40" width="10" height="8" rx="2" fill="#7B61FF" opacity="0.4"/>
    <rect x="36" y="72" width="10" height="8" rx="2" fill="#7B61FF" opacity="0.4"/>
    <rect x="74" y="72" width="10" height="8" rx="2" fill="#0A84FF" opacity="0.4"/>
    <!-- Tiny circuit lines in VM boxes -->
    <line x1="38" y1="44" x2="44" y2="44" stroke="#0A84FF" stroke-width="0.8" opacity="0.6"/>
    <line x1="76" y1="44" x2="82" y2="44" stroke="#7B61FF" stroke-width="0.8" opacity="0.6"/>
  </g>
</svg>
