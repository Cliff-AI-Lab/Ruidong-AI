<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <!-- Neural network nodes -->
  <g filter="url(#glow1)">
    <!-- Left column -->
    <circle cx="30" cy="35" r="5" fill="url(#g1)"/>
    <circle cx="30" cy="60" r="5" fill="url(#g1)"/>
    <circle cx="30" cy="85" r="5" fill="url(#g1)"/>
    <!-- Middle column -->
    <circle cx="60" cy="42" r="6" fill="#0A84FF"/>
    <circle cx="60" cy="72" r="6" fill="#0A84FF"/>
    <!-- Right column -->
    <circle cx="90" cy="60" r="7" fill="#00D4AA"/>
    <!-- Connections -->
    <line x1="35" y1="35" x2="54" y2="42" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="60" x2="54" y2="42" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="60" x2="54" y2="72" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="85" x2="54" y2="72" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="35" y1="35" x2="54" y2="72" stroke="#0A84FF" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="85" x2="54" y2="42" stroke="#0A84FF" stroke-width="1" opacity="0.3"/>
    <line x1="66" y1="42" x2="83" y2="60" stroke="#00D4AA" stroke-width="1.5" opacity="0.6"/>
    <line x1="66" y1="72" x2="83" y2="60" stroke="#00D4AA" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Pulse rings on output node -->
  <circle cx="90" cy="60" r="12" stroke="#00D4AA" stroke-width="1" opacity="0.3" fill="none"/>
  <circle cx="90" cy="60" r="18" stroke="#00D4AA" stroke-width="0.5" opacity="0.15" fill="none"/>
</svg>
