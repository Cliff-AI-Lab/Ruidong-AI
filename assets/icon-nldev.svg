<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glow2)">
    <!-- Chat bubble -->
    <rect x="22" y="25" width="76" height="48" rx="12" stroke="url(#g2)" stroke-width="2" fill="none"/>
    <path d="M40 73 L36 85 L52 73" stroke="url(#g2)" stroke-width="2" fill="none"/>
    <!-- Code lines inside bubble -->
    <rect x="34" y="38" width="28" height="3" rx="1.5" fill="#7B61FF" opacity="0.9"/>
    <rect x="34" y="46" width="42" height="3" rx="1.5" fill="#0A84FF" opacity="0.7"/>
    <rect x="34" y="54" width="20" height="3" rx="1.5" fill="#00D4AA" opacity="0.6"/>
    <!-- Cursor blink -->
    <rect x="56" y="53" width="2" height="5" rx="1" fill="#00D4AA"/>
    <!-- AI sparkles -->
    <circle cx="82" cy="34" r="2" fill="#00D4AA" opacity="0.8"/>
    <circle cx="90" cy="40" r="1.5" fill="#7B61FF" opacity="0.6"/>
    <circle cx="86" cy="28" r="1" fill="#0A84FF" opacity="0.5"/>
  </g>
  <!-- Signal waves from bubble -->
  <path d="M88 90 Q95 85 88 80" stroke="#0A84FF" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M92 92 Q101 85 92 78" stroke="#0A84FF" stroke-width="1" fill="none" opacity="0.25"/>
</svg>
