<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="ge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <filter id="gle"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#gle)">
    <!-- Lightning bolt -->
    <path d="M68 20 L48 56 L58 56 L42 100 L82 52 L68 52 L80 20Z" fill="url(#ge)" opacity="0.85"/>
    <!-- Inner lightning highlight -->
    <path d="M66 28 L52 52 L60 52 L48 88" stroke="#0D1117" stroke-width="2" fill="none" opacity="0.4"/>
    <!-- Circuit nodes around bolt -->
    <circle cx="32" cy="40" r="3" fill="#0A84FF" opacity="0.5"/>
    <circle cx="92" cy="70" r="3" fill="#00D4AA" opacity="0.5"/>
    <circle cx="30" cy="80" r="2.5" fill="#00D4AA" opacity="0.4"/>
    <circle cx="94" cy="38" r="2.5" fill="#0A84FF" opacity="0.4"/>
    <!-- Connection lines from bolt to nodes -->
    <line x1="48" y1="56" x2="35" y2="40" stroke="#0A84FF" stroke-width="0.8" opacity="0.3"/>
    <line x1="82" y1="52" x2="91" y2="70" stroke="#00D4AA" stroke-width="0.8" opacity="0.3"/>
    <line x1="42" y1="100" x2="33" y2="80" stroke="#00D4AA" stroke-width="0.8" opacity="0.3"/>
    <line x1="68" y1="20" x2="91" y2="38" stroke="#0A84FF" stroke-width="0.8" opacity="0.3"/>
  </g>
  <!-- Energy pulse rings -->
  <circle cx="60" cy="60" r="38" stroke="#00D4AA" stroke-width="0.6" opacity="0.12" fill="none"/>
  <circle cx="60" cy="60" r="48" stroke="#0A84FF" stroke-width="0.4" opacity="0.08" fill="none"/>
</svg>
