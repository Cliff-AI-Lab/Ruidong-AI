<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <filter id="glr"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glr)">
    <!-- Document -->
    <rect x="30" y="22" width="50" height="66" rx="5" stroke="url(#gr)" stroke-width="2" fill="#7B61FF" fill-opacity="0.06"/>
    <!-- Page fold -->
    <path d="M68 22 L80 34 L68 34Z" fill="#7B61FF" opacity="0.3"/>
    <!-- Data rows -->
    <rect x="38" y="34" width="22" height="3" rx="1.5" fill="#7B61FF" opacity="0.6"/>
    <rect x="38" y="42" width="30" height="3" rx="1.5" fill="#0A84FF" opacity="0.5"/>
    <rect x="38" y="50" width="18" height="3" rx="1.5" fill="#00D4AA" opacity="0.5"/>
    <rect x="38" y="58" width="26" height="3" rx="1.5" fill="#0A84FF" opacity="0.4"/>
    <!-- Mini chart at bottom of doc -->
    <rect x="38" y="66" width="6" height="14" rx="1" fill="#7B61FF" opacity="0.5"/>
    <rect x="48" y="70" width="6" height="10" rx="1" fill="#0A84FF" opacity="0.5"/>
    <rect x="58" y="62" width="6" height="18" rx="1" fill="#00D4AA" opacity="0.6"/>
    <rect x="68" y="66" width="6" height="14" rx="1" fill="#7B61FF" opacity="0.5"/>
    <!-- "5th" badge -->
    <circle cx="84" cy="74" r="12" fill="#0D1117" stroke="#00D4AA" stroke-width="1.5"/>
    <text x="84" y="78" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#00D4AA">5</text>
  </g>
</svg>
