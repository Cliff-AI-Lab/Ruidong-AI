<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glg"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glg)">
    <!-- Globe outline -->
    <circle cx="60" cy="60" r="32" stroke="url(#gg)" stroke-width="2" fill="none"/>
    <!-- Longitude lines -->
    <ellipse cx="60" cy="60" rx="16" ry="32" stroke="#0A84FF" stroke-width="1" fill="none" opacity="0.4"/>
    <ellipse cx="60" cy="60" rx="28" ry="32" stroke="#0A84FF" stroke-width="0.8" fill="none" opacity="0.25"/>
    <!-- Latitude lines -->
    <ellipse cx="60" cy="46" rx="28" ry="6" stroke="#00D4AA" stroke-width="0.8" fill="none" opacity="0.3"/>
    <ellipse cx="60" cy="60" rx="32" ry="8" stroke="#00D4AA" stroke-width="1" fill="none" opacity="0.4"/>
    <ellipse cx="60" cy="74" rx="28" ry="6" stroke="#00D4AA" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Network nodes on globe -->
    <circle cx="45" cy="48" r="3" fill="#0A84FF" opacity="0.8"/>
    <circle cx="72" cy="55" r="3" fill="#00D4AA" opacity="0.8"/>
    <circle cx="55" cy="72" r="3" fill="#7B61FF" opacity="0.8"/>
    <circle cx="68" cy="42" r="2.5" fill="#7B61FF" opacity="0.6"/>
    <!-- Network connections -->
    <line x1="45" y1="48" x2="72" y2="55" stroke="#00D4AA" stroke-width="1" opacity="0.4"/>
    <line x1="72" y1="55" x2="55" y2="72" stroke="#7B61FF" stroke-width="1" opacity="0.4"/>
    <line x1="45" y1="48" x2="55" y2="72" stroke="#0A84FF" stroke-width="1" opacity="0.4"/>
    <line x1="45" y1="48" x2="68" y2="42" stroke="#7B61FF" stroke-width="0.8" opacity="0.3"/>
  </g>
  <!-- Orbit ring -->
  <ellipse cx="60" cy="60" rx="42" ry="12" stroke="#7B61FF" stroke-width="0.6" fill="none" opacity="0.15" transform="rotate(-20 60 60)"/>
</svg>
