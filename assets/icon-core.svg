<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <filter id="glc"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glc)">
    <!-- Crosshair rings -->
    <circle cx="60" cy="60" r="30" stroke="url(#gc)" stroke-width="2" fill="none"/>
    <circle cx="60" cy="60" r="18" stroke="#0A84FF" stroke-width="1.5" fill="none" opacity="0.7"/>
    <!-- Center core -->
    <circle cx="60" cy="60" r="6" fill="#7B61FF" opacity="0.9"/>
    <circle cx="60" cy="60" r="3" fill="#00D4AA"/>
    <!-- Crosshair lines -->
    <line x1="60" y1="22" x2="60" y2="38" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="82" x2="60" y2="98" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="22" y1="60" x2="38" y2="60" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <line x1="82" y1="60" x2="98" y2="60" stroke="#0A84FF" stroke-width="1.5" opacity="0.6"/>
    <!-- Corner data nodes -->
    <circle cx="36" cy="36" r="2.5" fill="#00D4AA" opacity="0.6"/>
    <circle cx="84" cy="36" r="2.5" fill="#7B61FF" opacity="0.6"/>
    <circle cx="36" cy="84" r="2.5" fill="#7B61FF" opacity="0.6"/>
    <circle cx="84" cy="84" r="2.5" fill="#00D4AA" opacity="0.6"/>
    <!-- Corner connections -->
    <line x1="38" y1="38" x2="54" y2="54" stroke="#00D4AA" stroke-width="0.8" opacity="0.35"/>
    <line x1="82" y1="38" x2="66" y2="54" stroke="#7B61FF" stroke-width="0.8" opacity="0.35"/>
    <line x1="38" y1="82" x2="54" y2="66" stroke="#7B61FF" stroke-width="0.8" opacity="0.35"/>
    <line x1="82" y1="82" x2="66" y2="66" stroke="#00D4AA" stroke-width="0.8" opacity="0.35"/>
  </g>
</svg>
