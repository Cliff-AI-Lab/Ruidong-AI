<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glar"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glar)">
    <!-- Central gear -->
    <circle cx="60" cy="60" r="18" stroke="url(#gar)" stroke-width="2" fill="none"/>
    <circle cx="60" cy="60" r="8" fill="#0A84FF" opacity="0.3"/>
    <circle cx="60" cy="60" r="4" fill="#00D4AA" opacity="0.8"/>
    <!-- Gear teeth -->
    <rect x="56" y="38" width="8" height="8" rx="1.5" fill="#0A84FF" opacity="0.6"/>
    <rect x="56" y="74" width="8" height="8" rx="1.5" fill="#0A84FF" opacity="0.6"/>
    <rect x="38" y="56" width="8" height="8" rx="1.5" fill="#7B61FF" opacity="0.6"/>
    <rect x="74" y="56" width="8" height="8" rx="1.5" fill="#7B61FF" opacity="0.6"/>
    <!-- Diagonal teeth -->
    <rect x="40" y="40" width="7" height="7" rx="1.5" fill="#00D4AA" opacity="0.4" transform="rotate(45 43.5 43.5)"/>
    <rect x="73" y="40" width="7" height="7" rx="1.5" fill="#00D4AA" opacity="0.4" transform="rotate(45 76.5 43.5)"/>
    <rect x="40" y="73" width="7" height="7" rx="1.5" fill="#00D4AA" opacity="0.4" transform="rotate(45 43.5 76.5)"/>
    <rect x="73" y="73" width="7" height="7" rx="1.5" fill="#00D4AA" opacity="0.4" transform="rotate(45 76.5 76.5)"/>
    <!-- Connection lines to edges -->
    <line x1="60" y1="34" x2="60" y2="24" stroke="#0A84FF" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="86" x2="60" y2="96" stroke="#0A84FF" stroke-width="1" opacity="0.4"/>
    <line x1="34" y1="60" x2="24" y2="60" stroke="#7B61FF" stroke-width="1" opacity="0.4"/>
    <line x1="86" y1="60" x2="96" y2="60" stroke="#7B61FF" stroke-width="1" opacity="0.4"/>
    <!-- Endpoint dots -->
    <circle cx="60" cy="22" r="2" fill="#0A84FF" opacity="0.5"/>
    <circle cx="60" cy="98" r="2" fill="#0A84FF" opacity="0.5"/>
    <circle cx="22" cy="60" r="2" fill="#7B61FF" opacity="0.5"/>
    <circle cx="98" cy="60" r="2" fill="#7B61FF" opacity="0.5"/>
  </g>
</svg>
