<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="gli"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#gli)">
    <!-- Building 1 - left -->
    <rect x="22" y="48" width="18" height="44" rx="3" stroke="#0A84FF" stroke-width="1.5" fill="#0A84FF" fill-opacity="0.1"/>
    <rect x="26" y="54" width="4" height="4" rx="1" fill="#0A84FF" opacity="0.6"/>
    <rect x="32" y="54" width="4" height="4" rx="1" fill="#0A84FF" opacity="0.6"/>
    <rect x="26" y="62" width="4" height="4" rx="1" fill="#0A84FF" opacity="0.4"/>
    <rect x="32" y="62" width="4" height="4" rx="1" fill="#0A84FF" opacity="0.4"/>
    <!-- Building 2 - center (tall) -->
    <rect x="44" y="30" width="22" height="62" rx="3" stroke="#00D4AA" stroke-width="1.5" fill="#00D4AA" fill-opacity="0.1"/>
    <rect x="49" y="36" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.6"/>
    <rect x="57" y="36" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.6"/>
    <rect x="49" y="44" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="57" y="44" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="49" y="52" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.4"/>
    <rect x="57" y="52" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.4"/>
    <!-- Building 3 - right -->
    <rect x="70" y="42" width="18" height="50" rx="3" stroke="#7B61FF" stroke-width="1.5" fill="#7B61FF" fill-opacity="0.1"/>
    <rect x="74" y="48" width="4" height="4" rx="1" fill="#7B61FF" opacity="0.6"/>
    <rect x="80" y="48" width="4" height="4" rx="1" fill="#7B61FF" opacity="0.6"/>
    <rect x="74" y="56" width="4" height="4" rx="1" fill="#7B61FF" opacity="0.4"/>
    <rect x="80" y="56" width="4" height="4" rx="1" fill="#7B61FF" opacity="0.4"/>
    <!-- Network connections between buildings -->
    <line x1="40" y1="60" x2="44" y2="55" stroke="#00D4AA" stroke-width="1" opacity="0.5"/>
    <line x1="66" y1="55" x2="70" y2="58" stroke="#7B61FF" stroke-width="1" opacity="0.5"/>
    <!-- Signal arcs above -->
    <path d="M31 44 Q55 18 79 38" stroke="url(#gi)" stroke-width="1.2" fill="none" opacity="0.4"/>
    <path d="M35 40 Q55 22 75 36" stroke="url(#gi)" stroke-width="0.8" fill="none" opacity="0.25"/>
    <!-- Data node at top -->
    <circle cx="55" cy="22" r="3" fill="#00D4AA" opacity="0.7"/>
  </g>
  <!-- Ground line -->
  <line x1="18" y1="92" x2="102" y2="92" stroke="#0A84FF" stroke-width="1" opacity="0.2"/>
</svg>
