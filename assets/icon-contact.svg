<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gct" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="glct"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="120" height="120" rx="24" fill="#0D1117"/>
  <g filter="url(#glct)">
    <!-- Envelope -->
    <rect x="24" y="36" width="72" height="48" rx="6" stroke="url(#gct)" stroke-width="2" fill="#0A84FF" fill-opacity="0.06"/>
    <!-- Envelope flap -->
    <path d="M24 36 L60 64 L96 36" stroke="url(#gct)" stroke-width="2" fill="none"/>
    <!-- Signal waves from envelope -->
    <path d="M78 30 Q86 26 78 22" stroke="#00D4AA" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M82 32 Q92 26 82 20" stroke="#00D4AA" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M86 34 Q98 26 86 18" stroke="#00D4AA" stroke-width="0.8" fill="none" opacity="0.2"/>
    <!-- Data nodes -->
    <circle cx="38" cy="92" r="2" fill="#0A84FF" opacity="0.4"/>
    <circle cx="60" cy="92" r="2" fill="#00D4AA" opacity="0.4"/>
    <circle cx="82" cy="92" r="2" fill="#7B61FF" opacity="0.4"/>
    <line x1="40" y1="92" x2="58" y2="92" stroke="#00D4AA" stroke-width="0.8" opacity="0.3"/>
    <line x1="62" y1="92" x2="80" y2="92" stroke="#7B61FF" stroke-width="0.8" opacity="0.3"/>
  </g>
</svg>
