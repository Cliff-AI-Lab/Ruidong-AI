<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="260" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#0A84FF" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="260"/><line x1="200" y1="0" x2="200" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/><line x1="400" y1="0" x2="400" y2="260"/>
    <line x1="500" y1="0" x2="500" y2="260"/><line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="700" y1="0" x2="700" y2="260"/><line x1="800" y1="0" x2="800" y2="260"/>
    <line x1="900" y1="0" x2="900" y2="260"/><line x1="1000" y1="0" x2="1000" y2="260"/>
    <line x1="1100" y1="0" x2="1100" y2="260"/>
  </g>
  <!-- Ambient glow orbs -->
  <g filter="url(#softGlow)">
    <circle cx="200" cy="130" r="60" fill="#0A84FF" opacity="0.07"/>
    <circle cx="600" cy="100" r="80" fill="#00D4AA" opacity="0.06"/>
    <circle cx="1000" cy="140" r="60" fill="#7B61FF" opacity="0.07"/>
  </g>
  <!-- Neural network decoration - left -->
  <g opacity="0.25">
    <circle cx="80" cy="70" r="3" fill="#0A84FF"/><circle cx="120" cy="50" r="2.5" fill="#00D4AA"/>
    <circle cx="140" cy="90" r="2" fill="#7B61FF"/><circle cx="60" cy="110" r="2.5" fill="#0A84FF"/>
    <circle cx="100" cy="130" r="2" fill="#00D4AA"/>
    <line x1="80" y1="70" x2="120" y2="50" stroke="#0A84FF" stroke-width="0.8"/>
    <line x1="80" y1="70" x2="140" y2="90" stroke="#0A84FF" stroke-width="0.6"/>
    <line x1="120" y1="50" x2="140" y2="90" stroke="#00D4AA" stroke-width="0.6"/>
    <line x1="60" y1="110" x2="80" y2="70" stroke="#0A84FF" stroke-width="0.6"/>
    <line x1="60" y1="110" x2="100" y2="130" stroke="#00D4AA" stroke-width="0.6"/>
  </g>
  <!-- Neural network decoration - right -->
  <g opacity="0.25">
    <circle cx="1060" cy="80" r="3" fill="#7B61FF"/><circle cx="1100" cy="60" r="2.5" fill="#0A84FF"/>
    <circle cx="1120" cy="100" r="2" fill="#00D4AA"/><circle cx="1080" cy="140" r="2.5" fill="#7B61FF"/>
    <circle cx="1140" cy="130" r="2" fill="#0A84FF"/>
    <line x1="1060" y1="80" x2="1100" y2="60" stroke="#7B61FF" stroke-width="0.8"/>
    <line x1="1100" y1="60" x2="1120" y2="100" stroke="#0A84FF" stroke-width="0.6"/>
    <line x1="1060" y1="80" x2="1080" y2="140" stroke="#7B61FF" stroke-width="0.6"/>
    <line x1="1080" y1="140" x2="1140" y2="130" stroke="#0A84FF" stroke-width="0.6"/>
  </g>
  <!-- Floating particles -->
  <g opacity="0.3">
    <circle cx="250" cy="40" r="1.5" fill="#00D4AA"/><circle cx="350" cy="210" r="1" fill="#0A84FF"/>
    <circle cx="450" cy="30" r="1.5" fill="#7B61FF"/><circle cx="750" cy="220" r="1" fill="#00D4AA"/>
    <circle cx="850" cy="35" r="1.5" fill="#0A84FF"/><circle cx="950" cy="200" r="1" fill="#7B61FF"/>
  </g>
  <!-- Main title -->
  <g filter="url(#textGlow)">
    <text x="600" y="105" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="url(#accent)" letter-spacing="-1">
      RUIDONG AI
    </text>
  </g>
  <!-- Subtitle -->
  <text x="600" y="145" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Helvetica, Arial, sans-serif" font-size="20" font-weight="300" fill="#8B949E" letter-spacing="6">
    ENTERPRISE AI FOR SCENES
  </text>
  <!-- Tagline -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', 'SF Pro Display', Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#58A6FF" opacity="0.7" letter-spacing="1">
    From Testing Grounds to Production Lines
  </text>
  <!-- Bottom gradient line -->
  <rect x="300" y="220" width="600" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <!-- Bottom dots -->
  <circle cx="295" cy="221" r="3" fill="#0A84FF" opacity="0.6"/>
  <circle cx="905" cy="221" r="3" fill="#7B61FF" opacity="0.6"/>
</svg>
